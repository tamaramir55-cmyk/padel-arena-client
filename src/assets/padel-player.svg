<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <!-- Padel player hitting ball - blue theme -->
  <g transform="translate(250,250)">
    <!-- Motion trail lines -->
    <g opacity="0.3" stroke="#3B82F6" stroke-width="2" stroke-linecap="round">
      <line x1="60" y1="-120" x2="120" y2="-160"/>
      <line x1="70" y1="-105" x2="130" y2="-140"/>
      <line x1="75" y1="-90" x2="135" y2="-120"/>
    </g>

    <!-- Shadow -->
    <ellipse cx="0" cy="200" rx="80" ry="12" fill="#1E40AF" opacity="0.15"/>

    <!-- Left leg -->
    <path d="M-20,100 L-60,160 L-70,200" stroke="#1E40AF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Left shoe -->
    <path d="M-70,200 L-90,200" stroke="#1D4ED8" stroke-width="16" stroke-linecap="round"/>

    <!-- Right leg -->
    <path d="M20,100 L60,155 L80,195" stroke="#1E40AF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right shoe -->
    <path d="M80,195 L100,195" stroke="#1D4ED8" stroke-width="16" stroke-linecap="round"/>

    <!-- Shorts -->
    <path d="M-30,70 Q0,110 30,70" fill="#2563EB"/>
    <rect x="-30" y="55" width="60" height="30" rx="5" fill="#2563EB"/>

    <!-- Torso -->
    <path d="M-35,55 L-30,-30 Q0,-45 30,-30 L35,55 Z" fill="#3B82F6"/>
    <!-- Shirt stripe -->
    <path d="M-5,-35 L-5,55" stroke="#60A5FA" stroke-width="3" opacity="0.4"/>
    <path d="M5,-35 L5,55" stroke="#60A5FA" stroke-width="3" opacity="0.4"/>

    <!-- Left arm (back arm, follows through) -->
    <path d="M-30,-20 L-70,-5 L-85,30" stroke="#2563EB" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Right arm (racket arm, extended up) -->
    <path d="M30,-20 L55,-60 L50,-100" stroke="#2563EB" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Racket -->
    <g transform="translate(50,-100) rotate(-25)">
      <!-- Handle -->
      <rect x="-3" y="0" width="6" height="25" rx="2" fill="#1E3A5F"/>
      <!-- Frame -->
      <ellipse cx="0" cy="-22" rx="18" ry="25" stroke="#1D4ED8" stroke-width="3" fill="#3B82F6" fill-opacity="0.3"/>
      <!-- Strings -->
      <g stroke="#93C5FD" stroke-width="0.7" opacity="0.6">
        <line x1="-12" y1="-22" x2="12" y2="-22"/>
        <line x1="-15" y1="-30" x2="15" y2="-30"/>
        <line x1="-15" y1="-14" x2="15" y2="-14"/>
        <line x1="-12" y1="-6" x2="12" y2="-6"/>
        <line x1="-14" y1="-38" x2="14" y2="-38"/>
        <line x1="-5" y1="-47" x2="-5" y2="0"/>
        <line x1="5" y1="-47" x2="5" y2="0"/>
        <line x1="-10" y1="-44" x2="-10" y2="-2"/>
        <line x1="10" y1="-44" x2="10" y2="-2"/>
      </g>
    </g>

    <!-- Ball -->
    <circle cx="85" cy="-140" r="10" fill="#C8E632"/>
    <path d="M78,-147 Q85,-140 78,-133" stroke="#A3B82A" stroke-width="1.5" fill="none"/>
    <path d="M92,-147 Q85,-140 92,-133" stroke="#A3B82A" stroke-width="1.5" fill="none"/>
    <!-- Ball impact lines -->
    <g stroke="#60A5FA" stroke-width="2" stroke-linecap="round" opacity="0.6">
      <line x1="100" y1="-150" x2="112" y2="-158"/>
      <line x1="102" y1="-138" x2="115" y2="-138"/>
      <line x1="98" y1="-128" x2="108" y2="-122"/>
    </g>

    <!-- Head -->
    <circle cx="0" cy="-55" r="22" fill="#2563EB"/>
    <!-- Headband -->
    <rect x="-22" y="-62" width="44" height="6" rx="3" fill="#1D4ED8"/>
    <!-- Hair -->
    <path d="M-18,-70 Q-10,-82 0,-78 Q10,-82 18,-70" fill="#1E3A5F"/>
    <!-- Face features -->
    <circle cx="-7" cy="-52" r="2" fill="#1E3A5F"/>
    <circle cx="7" cy="-52" r="2" fill="#1E3A5F"/>
    <path d="M-4,-44 Q0,-41 4,-44" stroke="#1E3A5F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>